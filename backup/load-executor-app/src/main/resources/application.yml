server:
  port: 9091

spring:
  application:
    name: scheduler-redis-monitor
  
  datasource:
    url: jdbc:mysql://localhost:3306/experiment?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=utf8
    username: demo
    password: demo123
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  
  jpa:
    database-platform: org.hibernate.dialect.MySQL8Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  # Redis配置
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
          max-wait: -1ms

# Actuator配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
    metrics:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}

# 定时任务配置
scheduler:
  # 定时任务执行间隔(毫秒)
  fixed-rate: 5000
  # 数据写入配置
  data:
    # 每次写入的数据条数
    batch-size: 10
    # Redis Key前缀
    key-prefix: "scheduler:data:"

# 日志配置
logging:
  level:
    root: INFO
    com.example.scheduler: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

observability:
  loki:
    url: http://localhost:3100
  grafana:
    url: http://localhost:3000
    org-id: "1"
    default-refresh: 5s
    dashboards:
      - uid: experiment-monitor
        title: "实验监控 - Redis & MySQL 核心指标"
        description: "Redis/MySQL QPS、延迟、线程池等核心指标看板"
        default-from: now-15m
        default-to: now
        height: 800px
      - uid: logs-observability
        title: "实验日志（Loki）"
        description: "Loki 查询日志嵌入面板"
        default-from: now-15m
        default-to: now
        height: 420px

# 数据生成器默认配置
data-generator:
  default-value-size-bytes: 1024
  default-batch-size: 5000
  default-ttl-seconds: 3600
  default-key-prefix: "dg:"
  default-list-window: 1000
  default-fav-per-user: 200
