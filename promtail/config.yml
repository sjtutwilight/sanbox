server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker-containers
    pipeline_stages:
      - docker: {}
      - labels:
          container: container_name
          image: image
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          __path__: /var/lib/docker/containers/*/*.log

  - job_name: app-json-logs
    pipeline_stages:
      - json:
          expressions:
            level: level
            logger: logger
            thread: thread
            message: message
            experiment_id: experimentId
            experiment_template_id: experimentTemplateId
            group_id: groupId
            operation_id: operationId
            task_id: taskId
      - labels:
          level:
          experiment_id:
          experiment_template_id:
          group_id:
          operation_id:
          task_id:
    static_configs:
      - targets:
          - localhost
        labels:
          job: application
          __path__: /var/log/app/*.log
