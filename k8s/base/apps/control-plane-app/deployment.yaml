apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-plane-app
  namespace: platform-apps
  labels:
    app.kubernetes.io/name: control-plane-app
    app.kubernetes.io/component: control-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: control-plane-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: control-plane-app
        app.kubernetes.io/component: control-plane
    spec:
      containers:
        - name: control-plane-app
          image: control-plane-app:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8083
          env:
            # 基线环境默认使用本地/同命名空间服务地址，overlay 会补齐 k3s 专用配置。
            - name: SPRING_PROFILES_ACTIVE
              value: k3s
            - name: LOAD_EXECUTOR_BASE_URL
              value: http://load-executor.platform-apps.svc.cluster.local:18082
            - name: LOKI_URL
              value: http://loki.platform-observability.svc.cluster.local:3100
            - name: GRAFANA_URL
              value: http://grafana.platform-observability.svc.cluster.local:3000
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
